body:
  text: 後山談叢卷一宋陳師道撰契丹侵澶淵萊公相真宗北伐臨河未渡是夕內人相泣明日參知政事王欽若請幸金陵樞密副使陳文忠公堯叟請幸蜀真宗以問公公曰此與昨暮泣者何異議數日不决出遇髙烈武王瓊謂之曰子為上將視國之危不一言何也王謝之乃復入請召問從官至皆默然楊文公獨與公同其說數千言真宗以一言折之曰儒不知兵又請召問諸將王曰蜀逺欽若之議是也上與後宫御樓船浮汴而下數日可至殿上皆以為然公大驚色脫王又曰臣言亦死不言亦死與其事至而死不若言而死今陛下去都城一步則城中别有主矣吏卒皆北人家在都下將歸事其主誰肯送陛下者金陵可到邪公又喜過望曰瓊知此何不為上駕邪王乃大呼逍遙子公掖真宗以升遂渡河而成功欽若愧其議讒於真宗曰寇凖孤注子爾博者謂窮而盡所有以幸勝為孤注言以人主而一决也澶淵之役真宗欲南下萊公不可曰是棄中原也又欲斷橋因河而守曰是棄河北也國之存亡在河北不可棄也澶淵之役所下一紙書爾州縣堅壁鄉村入保金幣自隨榖不可徙隨在瘞藏敵至勿戰故敵雖深入而無得方破德清一城而得不補失未戰而困真宗既渡河遂幸澶淵之北門望見黃蓋士氣百倍歡聲動地兵既接射殺其帥順國王達蘭敵懼遂請和澶淵之役詔諸道㑹兵而合擊既和縱其去又詔諸將按兵遣使監楊延朗時敵使在館既諭㫖遽曰請遣中官貴諸將取信也而敵亦請使送欵遂以全歸懷之至今澶淵之役真宗使候萊公曰相公飲酒矣唱曲子矣擲骰子矣鼾睡矣萊公既逐死家無遺文嘉祐中始得奏章一紙憂其復失而并記之使後者有考焉曰臣奉聖㫖擘畫河北邊事及駕起與不起如起至何處者一近邊奏契丹遊騎已至深祁竊緣三路大軍見在定州魏能張凝楊延朗田敏等又在威虜軍等處東路深趙貝冀滄德等州别無大軍駐泊必慮契丹漸近東南下寨輕騎打劫不惟老小驚駭便恐乘勢長驅直至大名府以來人户驚移若不早張軍勢竊恐轉啓敵心臣乞先那起天雄軍馬萬人令周營杜彥鈿孫金照將領往貝州駐泊或恐天雄軍少且起五千只令孫金照部轄若敵騎在近即近城覔使襲擊兼令問將文字與石普圖承輸照㑹掩殺及召募強壯入敵界繞蕩鄉村仍照管南北道多差人探挨契丹次第聞奏及報大名一則貴安人心二則張軍勢以疑敵謀三則邊將聞三師北來軍威益壯四則與邢洛不逺成犄角之勢一隨駕諸軍扈衛宸居不可與大敵交鋒原野以爭勝負天雄至貝軍卒不過三萬人萬一契丹過貝下寨遊騎益南朗須那起定州軍馬三萬以上令桑贊守結陳南來鎮州及令河東雷有終將兵出土門路與贊㑹合相度事勢緊慢那至邢洛方可聖駕順動且幸大名假萬乘之天聲合數路之兵勢更令王超等於定州近城排布照應魏能張凝楊延朗田敏等作㑹合次第及依前來纍降指揮牽拽一恐契丹置寨於鎮定之間則定州軍馬抽那不起邢洛之北遊騎侵掠大名東北縣分老小大段驚移須分定州三路精兵令在彼將帥㑹合及令魏能張凝楊延朗田敏等漸那向東傍城寨牽拽如此則契丹必有後顧之憂未敢輕議懸軍深入若車駕不起轉恐契丹殘害生靈如蒙允許亦須過大河且幸澶淵就近易為制置㑹合兼控扼津梁右臣叨列宰司素無竒略既陳清問合罄鄙誠伏惟皇帝陛下睿知淵深聖猷宏逺固已坐籌而決勝尚能虛已以論謀兼彼大敵頗乏糧糗雖恃雄鋭之衆必懷茍且之憂豈敢不顧大軍但圖深入然亦慮其難測須至過有防虞煩黷天威伏增戰栗始講和敵使韓祀匿其善飲曰兩國初好數杯之後一言有失所誤非細後使姚東之既去而顧手顙再三是以知敵之情也姚東之曰守之事力契丹之士馬皆盛然此軍用于阻隘不能敵南平原馳突南軍亦不能支也慶厯二年西羌盜邊戰未解契丹保境使請關南十縣之地及昏丞相申公使其黨御史中丞賈文元公館之許昏與加賜使擇焉而遣知制誥富韓公諭意既見問故契丹曰宋塞鴈門廣塘水繕城隍藉民兵非違約羣臣亟請用兵孤謂不若求地也公曰契丹忘章聖之大德乎澶淵之役使從衆契丹無還者寧有今日耶且契丹之所欲戰爾戰非契丹之利也從古至今契丹因戰而利者惟晉氏爾方是時主弱而愚國小而貧政刑不修命令不行百姓內潰諸將外叛故契丹能得志然土地不守子女玉帛歸于臣民契丹蓋無得也人畜械器亡者大半故德光死其母怒不肯葬曰待我國中人馬如故然後葬汝戰而勝其害如此况不勝邪今契丹與宋好歲得金繒數十萬入于府庫國之利也故和則上得其利戰則下得其利上受其弊故契丹之臣皆願解和而搆戰與國爭利奈何舍己之利以利人邪主大悟㸃首久之公復曰塞鴈門以備羌塘始于何承矩事在約前地卑水聚歲久則廣城隍完故民兵補缺非違約也晉遺盧龍周取關南皆異代事若按圖而求舊豈契丹之利也哉皇帝以兼愛為心守祖宗之約不願用兵顧兄弟之義不欲違惰而為天保民為先保土不得以與人謂契丹乏金幣歲遺以永誓好古者敵國有無相通必皆欲背約絶好而加兵宋安得而避哉且澶淵之盟天地臨之豈可欺乎乃請昏公曰兄弟之國禮不通昏男女之際易以生隙且命修短不可期不若歲幣之久也始契丹請昏欲因以多求及公固拒羣議未決而難其久又謂空言無實使歸取誓書及再至定增歲幣二十萬始契丹一請宰相遽塞以二事且使自擇遂以為怯有輕宋心欲以增幣為獻與納公不可曰此下事上臣事君非敵國之禮也且章聖已有歲遺不為此名貨非國之輕重鄙而失國古雖小亦不為也主曰古有之何獨吝邪公曰古惟唐髙祖臣事突厥假其兵而取隋則或有之及太宗擒頡利突利兩可汗寧復有邪主不語其臣劉四知侍退數少公又曰石晉亦因契丹而得國不惟稱臣亦父事之或可用此今宋與契丹無唐晉之援而為敵國豈有此邪將退主曰卿謂孤故作此一節必不可事豈非不欲保和邪孤實無此意卿歸勿為此言恐誤宋大事耳於是留誓書而使以誓書來且求獻納公上奏曰臣既以死拒之敵氣折矣可勿復許敵無能為也仁宗從之韓公再使將見契丹曰主將為使不能久有言可即道公恐敵使來使遂以為例數請對曰吾不敢也當與君議於館爾契丹劉六符貴用事建議割地及館客怒謂韓公曰公為主言諸臣利於用兵不為國計六符豈欲間兩國邪公曰君寧出此顧餘人為之耳如宋不過弼數輩不欲戰爾其以戰說者何限六符既喜且懼然終以此得罪也契丹犯澶淵急書日至一夕凡五至萊公不發封談笑自如明日見同列以聞真宗大駭取而發之皆告急也又大懼以問公曰陛下欲了此不過五日爾其說請幸澶淵真宗不語同列懼欲退公曰士庶等止候駕起從駕而北真宗難之欲還內公曰陛下既入則臣不得到又不得見則大事去矣請無還內而行也遂行六軍百司追而及之東都曹生言范右相既貴接親舊情禮如故他亦不改世未有也然體面肥白潔澤豈其胸中亦以為樂邪惟司馬溫公枯瘦自如豈非不以富貴動其心邪王荆公改科舉暮年乃覺其失曰欲變學究為秀才不謂變秀才為學究也蓋舉子專誦王氏章句而不解義正如學究誦注疏爾教坊雜戲亦曰學詩於陸農師學易以豉切於龔古勇切深之蓋譏士之寡聞也王無咎黎宗孟皆為王氏學世謂黎為摸畫手一㸃一畫不出前人王為轉般倉致無嬴餘但有所缺以其因人成能無自得也楊內翰㑹云莊遵以易傳揚雄雄傳侯芭自芭而下世不絶傳至沛周郯郯傳樂安任奉古奉古傳廣凱凱傳繪所著索藴乃其學也張某公以御史為執政包孝肅公代之建言臺官不遷二府無所幸望則盡言矣張文定公方平為三司使孝肅極言其失遂罷歸院宋景文公代為使文公亦為上言故事執政惟三司使知開封府與御史中丞耳包拯自府入臺又言臺官不為執政所可假以進者惟三司耳極力攻臣冀得其處而用宋祁其勢必復攻祁不遂與之則三司使無其人矣孝肅逐景文公而代之遂遷西府孫文節公抃自西府遷右省御史韓績言其不可仁宗曰御史謂誰可參知政事者韓素不經意卒然對曰包拯可仁宗熟視而笑曰包拯非昔之包拯矣延帥闕李誠之以幕府行使方下國宥州牒保安軍故事歲賜盡明年六月乃畢緩不及方請以歲終為限幕府以聞樞密院牒草報如納李易其草報如故與遂上奏曰敵人之欲無厭許之不足為恩而長其貪且示之弱而人不堪其轉輸之勞矣樞密使夏竦劾李擅改制書遣吏部郎訊李曰改保安軍牒非制書也竦不能屈敵亦不敢復請某公惡韓富范三公欲廢之而不能軍興以韓范為西帥遣當使北名用仇而實間之又不克軍罷而請老盡用三公及宋莒公夏英公于二府皆其仇也又以其黨賈文元公陳恭公間焉猶欲因以傾之譽范富皆王佐可致太平於是天子再賜手詔又開天章閣而命之坐出紙筆使疏時政所當因革諸公皆推范富乃請退而具草使二宦者更往督之且命領西北邊事既而各條上十數事而易監司接羣吏罷磨勘減任子衆不利而謗興又使范公日獻二事以用之而請城京師人始笑之初某公每求以俟主意常未厭而去故能三入及罷大事猶問西北相攻請出大臣行三邊於是范公使河東陜西富公使河北初某既建議乃數出道者院宿焉范公既奉使宿道者院而某在焉兵退使人致問范公往見之某佯曰參政求去也范公以對某曰大臣豈可一日去君側去則不復還矣今萬里奉使故疑求去耳范公私笑之久而覺報緩而請不獲召堂吏而問曰吾為西帥每奏即下而請輒得今以執政奉使而請報不逮何也曰某别置司專行鄜延事故速而必得耳范公始以前言為然乃請守邊矣而富公亦不還韓又罷去而賈陳相矣及某薨范公自為祭文歸重而自訟云蘇黃兩公皆喜書不能懸手逸少非好鵝效其腕頸爾正謂懸手轉腕而蘇公論書以手抵案使腕不動為法此其異也善書不擇紙筆妙在心手不在物也古之至人耳目更用惟心而已王屋天壇道書云黃帝禮天處也壇之方隅陳入玉鏡而儒者疑焉元豐中有登天壇得方玉如鏡濮陽杜毅主王屋簿親見之云余與貴人語偶當其心明日使人來求異書士不知有自智專謂出於卷册之間良可悲也張長史見擔夫爭道而得筆法觀曹將軍舞劒又得其神造物豈能與人巧乃自悟之爾邊人獵而不漁熙寧中官軍復熙河洮水之魚浮取之如拾久而魚潜治世可俯鳥巢惟不暴爾至人入鳥獸不亂羣行之著也龍圖燕學士肅悟木理造指南車不成出見車馳門動而得其法蜀人王冕一本作晃為舉子詩義左之右之君子宜之而悟針法規矩可得其法不可得其巧捨規矩則無所求其巧矣法在人故必學巧在已故必悟今人學書而擬其㸃畫已失其法况其巧乎冦昌齡嗜硯墨得名晚居徐守問之曰墨貴黑硯貴發墨守不解以為輕已嗟乎世士可與語邪歐陽公像公家與蘇眉山皆有之而各自是也蓋蘇本韻勝而失形家本形似而失韻夫形而不韻乃所畫影爾非傳神也唐令民年二十為丁其下為推宋次道曰推者稚也避髙宗諱闕而為推邑縉叔曰推者椎也獨髻為椎傳者誤爾蓋唐人不諱嫌梁氏之父茂始以戊為武溫嗜殺人畏之并諱其嫌耳夫人少而分髻長則合而未冠今人猶然縉叔是也道士王太初受天心法治鬼神有功于人常謂為室當使户牖踈達若四壁𨼆密終為鬼所據耳唐魏鄭公狄梁公張燕公墓棘直而不岐世以為異而孔林無枳棘也秦少游有李廷圭墨半錠不為文理質如金石潘谷見之而拜曰真李氏故物也我生再見矣王四學士有之與此為二也墨乃平甫之所寶谷所見者其子游以遺少游也又有張遇墨一團面為盤龍鱗鬛悉具其妙如畫其背皆有張遇麝香墨字潘墨之龍略有大都耳亦妍妙有紋如盤系二物世未有也語曰良玉不琢謂其不借美于外也張又後子供備使李唐卿嘉祐中以書待詔者也喜墨常謂余曰和墨用麝欲其香有損于墨而竟亦不能香也不若並藏以熏之潘谷之墨香徹肌骨磨研至盡而香不衰陳惟達一作進之墨一篋十年而麝氣不入但自作松香耳蓋陳墨膚理堅密不受外熏潘墨外雖美而中踈爾南唐於饒置墨務歙置硯務揚置紙務各有官歲貢有數求墨工於海求紙工於蜀中主好蜀紙既得蜀工使行境內而六合之水與蜀同李本奚氏以達賜國姓世為墨官云唐之問質肅公之子有墨曰饒州供進墨務官李仲宣造世莫知其何子頗有家法唐以遺黃魯直魯直以為不逮孫氏所有而豫謂過之陳留孫待制家有墨半錠號稱廷圭但色重爾非古製也蔡新州確黃大夫好謙為陳諸生聞楊山人之善相人也過使相之曰蔡君宰相也似丁晉公然丁還而君死也黃君一散郡爾然家口四十則蔡貶矣元豐之末蔡為相黃由尚書郎出為蔡州過蔡而别問其家曰四十口矣蔡大駭曰楊生之言驗矣其後有新州之禍外大夫潁公初為黃州參軍謁夏英公公喜相人謂潁公曰吾使相爾而君真相也視其手曰雖貴而貧不如吾也出其子突如堆阜曰此大富之相也墅處潞之異人也金卿李生將赴試問得失焉曰兩貫四貫巡轄馬遞鋪皆莫測也李有田子萃過之及門息于廄置壁下有錢二千以二百為陌有榜曰巡轄馬遞鋪問之方困者所納課也李始悟其言而果黜焉花之名天下者洛陽牡丹廣陵芍藥耳紅葉而黃腰號金帶圍而無種有時而出則城中當有宰相韓魏公為守一出四枝公自當其一選客具樂以當之是時王岐公以髙科為倅王荆公以名士為屬皆在選而闕其一莫有當者數日不决而花已盛公命戒客而私自念今日有過客不問如何召使當之及暮髙水門報陳太博來亟使召之乃秀公也明日酒半折花歌以插之其後四公皆為首相蜀人勾龍爽作名畫記以范瓊趙承祐為神品孫位為逸品謂瓊與承祐類吳生而設色過之位雖工不中繩墨蘇長公謂彩色非吳生所為二子規模吳生故長於設色爾孫位方不用矩圓不用規乃吳生之流也余謂二子學吳生而能設色不得其本故用意於末其巧者乎後山談叢卷一
