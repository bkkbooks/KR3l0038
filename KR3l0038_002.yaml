body:
  text: 後山談叢卷二宋陳師道撰諺曰甘草先生則麥熟苦草生則黄蒿也又曰杏熟當年麥棗熟當年禾又曰棗不濟儉謂棗熟則歳豐也諺曰行得春風有夏雨蓋春之風數為夏之雨數小大急緩亦如之祕書丞張鍔嗜酒得竒疾中身而分左常苦寒雖暑月中著襪袴紗綿相半世傳王祥卧冰求魚以養母至今沂水歳寒冰厚獨祥卧處闕而不合章學士珉為布衣以宰相自許髙蓋大車盛服羣從而後出潤人謂之三品秀才驗鏡視其鼻鼻滑淨如削者古今人謂之闕有髙下今人鑄鐵鏡陷銅為面故明光禄李卿先築宅于廬甃皆用塼歳夏大雨閘門及竇積水數尺内外一洗而發去之唐人謂逸少天資不及工用故初不勝郗庾而莫年方妙余謂不然衛夫人見逸少學書拊膺而嘆曰後當勝已此豈無天資者耶而暮年方妙者乃大器晚成爾獐無膽兎無脾䐁無筋東都相國寺樓門唐人所造國初木工喻浩曰他皆可能惟不解卷簷爾每至其下仰而觀焉立極則坐坐極則卧求其理而不得門内兩井亭近代木工亦不解也寺有十絶此為二耳陜之守居多古屋下柱不過九尺唐制不為髙大務經乆耳行露亭用斗百餘數倍常數而朱實亭不用一斗亦一竒也魚行隨陽春夏浮而遡流秋冬沒而順流漁者隨其出沒上下而取之唐末岐梁爭長東院主者知其將亂日以菽粟與泥為土整附而墁之增其屋木一院笑以為狂亂既作食盡樵絶民所窖藏為李氏所奪皆餓死主沃塹為糜毁木為薪以免隴右有富人預為夾壁視食之餘可藏者乾之貯壁間亦免虞部閻見賢老為容守歸而自如曰惟節食爾每食常欠三四分初見部中老者問而得之韓幹畫走馬絹壞損其足李公麟謂雖失其足走自若也六一為布衣客相之曰耳白於面名則逺聞脣不貼齒一生惹謗言語毁譽豈亦有命耶齊之龍山鎮有平陸故城髙五丈四方五里附城有走馬臺其髙半之闊五之三上下如一其西與南則在内東北則在外也莫曉其理宼萊公凖少嘗為淮漕有方士為治丹砂用竹百二十尺而通其節以器盛丹置其上而立之半埋地中於時才得六十尺竹接而用之始於歳之朔且盡歳而止丹已融而墮器矣澄心堂南唐烈祖節度金陵之宴居也世以為元宗書殿誤矣趙内翰彦若家有澄心堂書目才三千餘卷有建業文房之印後有主者皆牙校也余於丹徒髙氏見楊行密節度淮南補將校牒紙光潔如玉膚如卵膜今士大夫所有澄心堂紙不迨也開封常得劇盜言富家難近貯以櫃篋扃鐍嚴固貴家喜陳衣而架有帕便可包後夏英公伏日供帳温室戒客具夾衣客皆笑之既坐體寒生粟乃以漆斛漬龍皮也酒半取瓦礫醮藥水為黄金以娛客世傳王氏元經薛氏傳關子明易傳李公對問録皆阮逸所著逸以草示蘇明允而子瞻言之宣城包鼎每畫虎掃溉一室屏人聲塞門塗牖穴屋取明一飲斗酒脫衣據地卧起行顧自視真虎也復飲斗酒取筆一揮意盡而去不待成也閻立本觀張僧繇江陵畫壁曰虛得名爾再往曰猶近代名手也三往於是寢食其下數日而後去夫閻以畫名一代其於張髙下間爾而不足以知之世之人強其不能而論能者之得失不亦踈乎李公麟云吳查學於張而過之蓋張守法度而吳有英氣也眉山公謂孫知微之畫工匠手爾六一公論書喜李西臺而集古不録張從申也兵部秦玠祠部李宗易皆學於西臺各有師法公為亳州問秦西臺何學曰張從申也見之否曰未也示之曰西臺不及也余於石舎人楊休家得蘇明允送石北使引石氏子謂明允書也以示秦少游少游好之曰學不迨其子而資過之乃東坡少所書也故常謂書為難豈余不知書遂以為難也金陵人喜解字習以為俗曰同田為富分貝為貧大坐為奎黄巢攻金陵人說之曰王母攻也王名巢入金陵則鏁矣遂解去夀之安豐塘楚相孫叔敖之所築也至今賴之塘西有廟焉塘上之木花皆西向子皆東向懷禪師每住持必舎講師說天台教使其徒聽焉學其可廢乎唐人根利一聞干悟故大梅才得祖一言入山坐庵諸老之門既悟亦曰得坐披衣向後自看不復學也今人根鈍聞一知一故雪竇以古人初悟之語為學者入道之門謂之因縁退而體究謂之看話蓋無言下悟理之質矣復取古法而次第之以為悟後析理之門謂之陶汰天衣宗之而圓通非之正用臨濟教門蓋用古責今也而其徒多不見諦後悔亦復故云閩越黄撥沙善視墓畫地為圖即知咎休故號撥沙婺人有世患左目者問之曰祖墳有木久則木根傷害其目必發墓以去之既發有根貫在左目出之而愈宿乳醫陳嫗年八十餘切脈知其生早晚月則知日日則知時宿有兩家就乳切其左曰毋遽是當夜生將就其右左家疑之不聽也曰是家當午而生無妨也過午則來日生矣復切之曰初更兩㸃其時也為母具食聽自便既多為備使候時以報扶母就蓐即生文正李公既薨夫人誕日宋宣獻公時為從官與其僚二十餘人詣第上夀拜于簾下宣獻前曰太夫人不飲以茶為夀探懷出之注湯以獻復拜而去襄陽承唐亂地荒民散林篁翳塞常有四大龜負一小龜而行或謂乗者為瑇瑁云代北界天池止荒逺巡候不至潘美節度河東新廟舎作脊記歳遣府倅祀之率常憚行後竟罷之契丹始至室易記乆之來議界舉知其然而莫能奪也生血皆赤怒心之所出也赤火色其性躁故象之二乗四果其白如乳出于淨心而鱟血碧蝦蛤無血其故何也御厨不登彘肉太祖常畜兩彘謂之神猪熙寜初罷之後有妖人登大慶殿據鴟尾既獲索彘血不得始悟祖意使復蓄之蓋彘血解術云茶洪之雙井越之日注登萊鰒魚明越江瑤柱莫能相先後而強為之第者皆勝心耳石决明登人謂之鰒魚明人謂之化孔螺牡蠣固氣蚶子益血蓋蛤屬惟蚶有血熙寜中作坊以門巷委狹請直而寛廣之神宗以太祖創始當有逺慮不許既而衆工作苦持兵奪門欲出為亂一老卒閉而拒之遂不得出捕之皆獲郯城民妻有二十一子而雙生者七夀之善鄉有吏垂乳流湩如乳婦神宗常夢入大府有植碑以金填字曰宰相項安節寤而求之乃太學生也慈聖解之曰項安節即吳充也於是正憲公為相頸有瘤焉而項生布衣至今朝散郎方通罷官還鄉夢至政事堂尚書左丞黄履素知通獨起迎語曰蕭灑蕭灑遂去通向前諸公語如黄既寤莫測也既而得官校理滿任得知睦州是歳建中元年黄以疾去乆矣往謝執政范右丞純禮曰先公常守睦有蕭灑桐廬郡十詩桐廬真蕭灑也周約夢登科作尉就舎於堂牖間得女子隻履竈間得筆墨後數歳中第為延州一尉既入廨舎皆夢所見求二物皆得之於其處文元賈公居守北都歐陽永叔使北還公預戒官妓辦詞以勸酒妓唯唯復使都㕔召而喻之妓亦唯唯公怪嘆以為山野既燕妓奉觴歌以為夀永叔把盞側聽每為引滿公復怪之召問所歌皆其詞也都市大賈趙氏世居貨寶言玉帶有刻文者皆有疵疾以蔽映爾美玉蓋不琢也比歳闕揚兩州化洛石為假帶質如瑾瑜然可辨者以有光也王沂公之先為農與其徒入山林以酒行既飲先後至失酒顧草間有醉蛇倒而捋之得酒與血怒而飲焉昏閉倒卧明日方醒視背傍積蝨成堆自是無蝨終身浙西地下積水故春夏厭雨諺曰夏旱修倉秋旱離鄉浙東地髙燥過雨即乾故春得雨即耕然常患少耳潁諺云子過母當暑而凉水退而魚潛皆為大水之候潁人謂前水為母後水為子水日至日長勢不能大水定而復來後水大於前水為子勝母水終魚當大出河濵之人厭於食鮮水退而魚不出為潛云田理有横有已間謂之立土横土立土不可稻為其不停水也許安世家有伯成樽如今羯鼔鞚也畔邑家令周陽家金鐘容十斗重三十八斤以今衡量校容水三斗四升重十九斤爾諺曰田怕秋旱人畏老貧又曰夏旱修倉秋旱離鄉歳自處暑至白露不雨則稻雖秀而不實吳地下濕不積一凶則飢矣趙元考云寒食麫臘月雪水為糊則不蠧南唐煮糊用黄丹王文獻公家以皁莢末置書葉間然不如也霍山曰丞相擅減宗廟羔莵鼃顔注羔莵鼃以供祭也周官蟈氏鄭康成注蟈今御所食蛙也宋書張暢弟牧為犬傷醫云當食蝦蟇而牧難之暢為先食前世北人食蛙南人不食也建業文房南唐烈祖節度金陵之别室也趙元考家有建業文房書目才三千餘卷有金陵圖書院印焉歐陽五代史周家人傳柴后邢州龍岡人世宗紀為堯山人拓䟦思恭思敬兄弟也而誤作一人司馬公休云馮如晦為長源令縣人譽之不容口問政亦不能道也王深父為衛真主簿始至亳州州守李恕之留不遣乆之求去李問其故曰回為衛真主簿而未嘗至治所與吏民相見以謂不可故求去耳李怒曰爾恃歐陽修而慢我深父曰回之所立豈待歐陽公而立邪卒歸衛真李怒不解深父遂免去參寥云王荆公私居如在朝庭忽有老卒生火掃地如法譽之不容口或觸燈即怒以為不勝任逐去之士不衣帛酒肉食肆不近營太祖之軍法也蜀平以參知政事吕餘慶知益州除用選人以輕其權而置武徳司刺守貪廉至必為驗蜀山有九枝木傳以為異卒火之歳餘御札問焉其賞至銀千兩而刺州縣捕武徳卒即殺之不以聞吏貪則降杖集吏民杖之蜀文富人皆召至京師量其材為三等其上官之次省員下押綱人安其居不願來以疾歸後復遣如是數四不使家居也夏英公既卒其家客鄢陵隣之謹僧有學解客常問之曰英公貪而喜殺其報如何曰以教言之當為龍爾未以為然也他日坐京師遇夏氏故吏語近其生曰狂夢遇公于塗氣貌枯悴白衣故暗問其所在曰為廬山東潭龍爾客始驚其後復至京師遇其故人於興國寺其鄰有相語曰廬山東潭龍已去矣客又大驚往問之曰東潭𨼆密人所不至往歳木皆立槁人始至其上潭水清徹有白龍在焉夏日之中水沸而龍死夜則復生冬結冰於數歳有僧十餘結廬其上為之誦經又數歳而龍去草木復生英公奉釋故當困厄復能致僧為之作福文思殿奉帝者之私凡物必具宣后當國九年不索一物或勸太祖誅降王乆則變生太祖笑曰守千里之國戰十萬之師而為我擒孤身逺客能為變乎釋從青人主某寺之某院陳講聚衆而靜居不出善畫樹石而人不使好事者為修候則量其多少而報之吕汲公以御史為淄倅過而請之不與也或問之曰後其所事而先其所好此吾所以不與也仁宗在位四十年邊羨不入御閣每大事賜宴一府令議以聞仁宗崩訃於契丹所遇聚哭既訃其主號慟執使者手曰四十二年不識兵矣塟而來祭以黄白羅為錢他亦稱是仁宗崩天下喪之如親余時為童與同僚聚哭不自知其哀也仁宗既疾京師小兒㑹闕下燃首以祈福日數百人有司不能禁將塟無老幼男女哭泣過哀宣后初臨朝西戎戒邊吏曰聖后相司馬公必用仁宗故事自今後敢以一人一騎入界者族杜防契丹名相也謂和親為便民戒契丹世世相受謹守其約又虞中國之敗約也凡十年遣使以事動四國而堅其約國初荆潮既平溪洞皆納土請吏太祖不受延議獨置辰州歳費四萬緍爾元祐執政議河兩說文潞公安樞密燾主故道范丞相王左丞存主新道士大夫是故者見文安是新者見王范持兩可者見四公也曹武恵王既下金陵降後主復遣還内治行潘公憂其死不能生致也止之王曰吾適受降見其臨渠猶顧左右扶而後過必不然也且彼有烈心自當君臣同盡必不生降既降亦必不死也故事常赦官典贓入已不赦熙寜以後始赦更罪元祐七年南郊赦杖罪八年秋皇太后服藥而赦則盡赦之矣故事郊而後赦奉祠不敬不以赦論治平中郎中易知素貪細既食大官醉飽失容御史以不敬聞韓魏公請論如律英宗不欲也魏公曰今而不刑後將廢禮英宗曰寜以他事坐之士以飲食得罪使何面目見士大夫乎後山談叢卷二
