body:
  text: 後山談叢卷四宋陳師道撰教坊之樂已不齊凡樂作不偕作止不偕止以先後次第而起止故婉而長然亦未始不齊也余於此得為政之法焉蜀中有小車獨推載八石前如牛頭又有大車用四人推載十石蓋木牛流馬也中秋隂暗天下如一中秋無月則兎不孕蚌不胎喬麥不實兎望月而孕蚌望月而胎喬麥得月而秀世兎皆雌惟月兎雄爾故望月而孕蜀稻先蒸而後炒謂之火米可以乆積以地潤故也蒸用大水空中為甑盛數石炒用石板為釡凡數十石油絹紙石灰麥糠馬矢糞草皆能出火廬州有坐化猫峽中有坐化胡孫李公擇家有坐化蛇唐有鸚鵡舎利鄆州陽榖自國初以來不訴災傷漢州徳陽及峽中定軍山皆有八陣圖定軍山下土堆也王師初伐蜀李吳范仁恕勸後主不拒而降不聽雍則仁恕之後也某官社子民言大陸今黎陽是也自此而西北降水疑安陽河是也大陸邢州鉅鹿泊也過此為九河父老言九河者正流分為支流同為逆河者為潮水所逆行十餘里邉海又有潮河自西山來經塘泊李相昉在周朝知開封府人望已歸太祖而昉獨不附王師入京昉又獨不朝貶道州司馬昉步行日十數里監者中人問其故曰須後命爾上聞之詔乗馬乃買驢而去三歳徙延州别駕在延州為生業以老三歳又徙昉不願内徙後二年宰相薦其可大用召判兵部昉五辭行至長安移疾六十日中使促之行至洛陽又移疾三十日而後行既至上勞之昉曰臣前日知事周而已今以事周之心事陛下上大喜曰宰相不謬薦人詩云惟寡婦之笱寡婦乃用笱爾古之漁笱亦有制也陳恕領春官以王文正為舉首歳中㧞劉子儀于帝選自云吾得二俊名世才也是不愧於知人楊文公以為然謂王楊休山立宗廟器也嘉州舊産紫竹楠榴櫻木等仕于蜀者競採之以為器人甚苦之吳中復作嘉陽四詠詩以悼之章氏之先起家將為王氏守北邊號大傅其妻練氏封郡君大傅嘗因事欲斬兩卒郡君苦救之不得乃隂縱之兩卒奔江南皆為將閩之亂也李氏使兩卒將而攻之大傅已卒其子守之兩卒使人諭郡君言城日暮當破郡君無憂也郡君報曰爾全我一家不若完此一城兩將許之諭使降足完一城此其所以有後也世以癩疾鼻陷為死證劉貢父晚有此疾又嘗坐和蘇子瞻詩罰金元祐中同為從官貢父曰前於曹州有盜夜入人家室無物但有書數卷耳盜忌空還取一卷而去乃舉子所著五七言也就庫家質之主人喜事好其詩不舎手明日盜敗吏取其書主人賂吏而私録之吏督之急且問其故曰吾愛其語將和之也吏曰賊詩不中和他子瞻亦曰少壯讀書頗知故事孔子常出顔仲二子行而過市而卒遇其師子路趫㨗躍而升木顔淵懦緩顧無所之就市中刑人所經幢避之所謂石幢子者既去市人以賢者所至不可復以故名遂共謂避孔塔坐者絶倒魯直為禮部試官或以柳枝來有法官曰泄漏春光有柳條魯直曰榆條凖此蓋律語有余條凖此也一坐大烘而文吏共深恨之閩中諸縣多至十萬户堅忍喜訟號難治卲武其尤者自國初至今有四令張鄧公杜宗㑹其二人則忘之矣宗㑹澶人趙普請繕都城太祖不可曰使冦至此其誰駐足耶王師既平蜀詔昶赴闕曹武肅王密奏曰孟昶王蜀三十年而蜀道千餘里請擒孟氏而赦其臣以防變太祖批其後曰你好雀兒腸肚蜀平二曹潘美自蜀還既對太祖為内燕惟三將與秦晉兩王爾既入乃福寜殿席地而坐陳彘肉斗酒情意款狎酒終設飯三將皆曰朝廷事力寡薄致陛下燕設不豐上曰豈止寡薄此飯乃乞來三將莫測曰近從江南乞此米也祕閣畫有梁文瓉五星二十八宿圖李公麟謂不減吳生婦女疑蜀手也頴諺曰黄􅀈口噤喬麥斗夏中候黄􅀈不鳴則喬麥可廣種也八月一日雨則角田下熟角田豆也角者麥之訛也婺州李翁與鄉人如五臺山衆少皆騎翁老且躄獨步行既至衆所見端相如常翁與山東老人所見寶閣千疊山東老人持菩薩戒四十年矣釋氏之願儒者所謂志也志則欲逺大逺大則成志在萬里則行不千里而已也近年華山毛峯有𨽻字曰伏苓下云諸山皆假惟此者真一旦一丸三斗三斤疑為服茯苓法也令山下人用三斗水煮藥三斤水盡為度蜜和而蒸服而不丸道者趙翁云蓋伏苓不蒸煮不能去隂氣也余謂不煮不能去皮梗也古者諸侯取財於國不取於諸侯豈特國民亦然也維桑與梓樹之榛栗椅桐梓漆梓漆以為棺榛栗以為贄椅桐以為器馬騾驢陽𩔖起則先前治用陽藥羊牛駞隂𩔖起則先後治用隂藥故獸醫有二種三稅法皇祐初為李諮所壞及韓魏公用茶小引益壞京師市井自三稅法改後日漸蕭條酒肆自包孝肅知府日重定􅀈錢壞三司故吏髙成端襄邑人明習吏事自五代以來三司條貫無不有也嘉祐中嘗言事不用契丹使至清徳軍㑹仁宗崩議欲却之又欲使至國門而去卲安簡欲使奉國書置柩前見天子以安逺人張貴妃受册詔問册畢受和儀其為修媛已自尊大卲必以三公事儀比命婦一品上之張永守蜀仲春官糶米仲春夏糶鹽恵民乾徳四年詔諸道受納稅賦不得稱分毫合勺銖絲忽景徳四年三司使丁謂復行稽括比咸平六年稅額增三百四十六萬五千二百二十九貫石王旦為相十一年王珪十年趙普沈倫韓琦曾公亮九年薛居正向敏中八年王曾章得象七年盧多遜李沆富弼六年李昉五年趙普吕蒙正張士遜吕夷簡皆三入顔常道曰某年河水圍濮州城竇失戒夜發聲如雷須臾巷水沒骭士有獻衣袽之法其要取綿絮胎縛作向大小不一使善泅卒沒城中捫漏穴用隨水勢畜入孔道即弭衆工隨興城堞無虞二廣居山谷間不𨽻州縣謂之傜人舟居謂之蜑人島上謂之黎人仁宗用兵無敵雖不服而心服使人數世服非無敵而何仰山元老既北歸青之山間有唐福元之故處深密巖險乆無人迹元與其徒往焉舎於石室夜則小參一夕聞疾風甚雨聲出視星月粲然乆之有大蛇行來蟠於室前仰首以聽即罷伸其下體如拜伏狀而後去從者震恐元自如也自是每夕必至太祖常幸秘書省召管軍官使觀書焉太祖置竹木務於汳上市竹木於秦晉由河入汳有卒千五百人出材於汳納材於塲置事材塲於務之側有二三千人凡興造者受成材焉其法曰有敢請生材者徒二年今啟聖院乃其材也今百年矣梁栱之際尚不容髪自置八作司以俱雜物而領以三司修造矣巖頭雪峯欽山同行至湖外詣村舎求水舎中獨一女子見山愛之為具熟水而水盞中有同心結山諭意而藏之遂稱疾而留巖峯既行復還訪之則已與女納昏是夕成禮乃誘出之投之棘叢展轉鈎挂而不能自出忽大呼曰我悟矣遂棄去既出世每升坐即曰錦帳香囊風吹滿路香大衆還知落處麽衆莫能對乆之傳至巖頭巖教之曰汝往但道傳語十八字好好事潘郎僧即對山曰此是巖頭道底僧人無語余為代曰熟處難忘徐之南山崇勝院主崇璟故王姓也熙寜中修殿大像腹中得畫像男女相向衣冠皆唐人也而題曰施主王崇璟豈其前身也耶北里張生家世奉道自謂當為左𤣥真人遂以為稱為朝元圖繪其像於位後夢為城神所逮詰而杖之既覺臋流血如常杖云古鏡懸而旋入之四平扣之玉聲錢世甓城前後相押凡四重號押塼故乆而不壞司業黄君守徐新彭祖樓砌用在重使草不生道者吕翁某初遇鍾離先生權受以乾汞為白金法翁曰後復變否曰五百歳後藥力盡則復故曰五百歳後當復誤人謝不受先生驚歎謂有受道之質遂授出世法蘇公自黄移汝過金陵見王荆公公曰好箇翰林學士某乆以此奉公公曰撫州出杖鼓鞚淮南豪子以厚價購之而撫人有之保之已數世矣不逺千里登門求售豪子擊之曰無聲遂不售撫人恨怒至河上投之水中吞吐有聲熟視而歎曰你早作聲我不至此圓通行脚至浮山逺録公深愛之欲收為嗣通遂去復以偈留之欲共評量古今公案通答曰究竟邑子冦定疽發於腦每呼其母自叙平生不孝與悌則痛可忍若有使之者又召其弟教以勿效我也中州松子雖粃小不可食然其子可種惟不可近手以杖擊其蓬使子墮地用深錐刺地深五寸許以帚埽入之無有不生者東坡居士種松法晁無咎移樹法其大根不可斷雖旁出逺引亦當盡取如其横生逺近掘地而埋之切須帶土雖大木亦可活也大木仍去其枝丁謂當國竄逐李冦二公欲殺不可既南貶而文定復相相傳忠愍為閻羅王世謂死活不得洞下太陽和尚乆而無嗣晚得逺公欲得為嗣逺曰弟子自有師承恐誤和尚太陽出淚逺曰請受授鞋他日為和尚接法嗣逺既住浮山愛青老明恵接以洞教後住投子遂嗣太陽云刁學士約喜交結請謁常至夜半號刁半夜杜祁公為相蘇學士舜欽其壻也歳暮以故事奏用賣故紙錢祠神以㑹賔客皆一時知名士也王宣徽拱辰丞銜史吕申公之黨也欲舉其事以動丞相曰可一舉而盡也有日刁亦與召叛其謀而不以告詰朝送客城東於是蘇坐自盜除名客皆逐丞相亦去而刁獨逸其後座客皆至從官而刁獨終於官職吕申公曰惟人主之眷不可恃參寥如洛游獨樂園有地髙亢不因枯枿生芝二十餘本寥謂老圃盍潤澤之使長茂圃曰天生靈物不假人力寥歎曰真温公之役也仁宗時契丹獻八尺字圖而書待詔皆未能也詔求善大書者有僧請為方丈字以沙布地為國字張圖於其上束氈為筆漬墨倚肩循沙而行仍脫袈裟投墨瓮中擲以為㸃遂賜紫衣里人某贓吏也既死請僧對靈追福夜中有驢伸首出于帷乆之而沒西都崇徳寺僧善端酒色自恣既病度必死念地獄果有然耶若有不亦危乎乃然香祝之曰地獄若無煙當上有則當下既炷烟下而地裂受之端大驚失色而逝仁宗每私宴十閤分獻熟食是歳秋初蛤蜊初至都或以為獻仁宗問曰安得已有此邪其價幾何曰每枚千錢一獻凡二十八枚上不樂曰我常戒爾輩勿為侈靡今一下箸費二十八千吾不堪也遂不食華隂吕君舉進士聘里中女未行既中第婦家言曰吾女故無疾既聘而後盲敢辭吕君曰既聘而後盲君不為欺又何辭遂娶之生五男子皆中進士第其一人丞相汲公是也黄綏武人常謂平生無大過惟於然河多得官為恨蓋邉徼例以虛功而受厚賞爾又謂議者重燕而輕夏燕人衣服飲食以中國為法夏人不慕中國習俗自如不可輕也又言為涇原總管嘗夜雪臨邊顧有馬迹使逐得之乃夏之邏人當四更者夏人逐更而巡中國之備不及也以渠自尋其境乃舎之乖崖為令嘗坐城門下見里人有負菜而歸者問何從得之曰買之市公怒曰汝居田里不自種而食何惰邪笞而遣之眉山公卒太學生侯泰武學生楊選素不識公率衆舉哀從者二百餘人欲飯僧於法雲主者惟白下聽慧林佛陁禪師聞而招致之參寥徙兖布衣李南式家甚貧供𬞞菽洗補恩為甚篤他日為曾子開言之子開曰吾輩當為公報之使知為善之效蘇長公以詩得罪劉攽貢父以繼和罰金既而坐事貶官湖外過黄而見蘇寒温外問有新諢否貢父曰有二屠父至其子而易業為儒賈二父每相見必以為患甲曰賢郎何為曰檢與一解爾乙復問曰與舉子唱和詩爾他日乙曰兒子竟不免解著賊贓縣已逮矣甲曰兒子其何免邪乙曰賢郎何虞曰若何著賦詩亦不穏變公應之曰賢尊得以憂裏後山談叢卷四
