body:
  text: 後山談叢小説家類一雜事之屬提要臣等謹案後山談叢四卷宋陳師道撰師道字無已後山其别號也彭城人以薦為棣州教授徽宗時官至祕書省正字事迹具宋史文苑傳陸遊老學庵筆記頗疑此書之偽又以為或其少作然師道後山集前有其門人魏衍附記稱談叢詩話别自為卷則是書實出師道手又第四卷中記蘇軾卒時太學諸生為飯僧考軾卒於徽宗建中靖國元年六月師道亦以是年十一月二十九日從祀南郊感寒疾卒則末年所作非少年所作審矣洪邁容齋隨筆議其載呂許公惡韓范富一條丁文簡陷蘇子美以撼杜祁公一條丁晉公賂中使沮張乖崖一條張乖崖買田宅自汚一條皆爽其實今考之良信然邁稱其筆力髙簡必傳於後世不云他人所􅎓托邁去師道不逺且其考證不草草知陸遊之言未免失之臆斷也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:55329bfb4d9013213a5a045f31e26f4876a13194387a6f27e6d7aed61f225938
