body:
  text: 後山談叢卷三宋陳師道撰仁宗初即位燕恭肅王以親尊自居上時遣使傳詔王坐不拜使還以聞上曰燕王朕叔父毋妄言久而王聞之稍自屈奉藩臣禮燕恭肅王輕施厚費不計有無常預借料錢多至數歲仁宗常詔有司復給如是數矣御史沈邈以謂不可以國之常入而奉無厭之求願使諭意上曰御史誤矣太宗之子八人今惟王爾先帝之弟朕之叔父也每恨不能盡天下以為養數歲之祿不足計也子曾子初見神宗上問曰卿與王安石布衣之舊安石何如對曰安石文學行義不減揚雄然吝所以不及古人曰安石輕富貴非吝也對曰非此之謂安於有為吝於改過上頷之明者無所不知智者有所知有所不知衆人所知者少所不知者多而強其所不知智者謂其擇而不為學而已為道雖則不然學得於外思出於意不足以得之莊子曰繕性於俗學以求復初初洞欲於俗思以求至其明古者謂之蔽蒙之民雖然學與思者道之助也士之為道必始於學此假疑有脫誤道者吕翁如金陵過王荆公而公知之伏拜請道翁曰子障重不可公又勤請曰我能去障則為子去之矣竟去以語廣陵王某王曰先生何取焉曰吾愛其目爾王以語余曰如金陵者翁之真身也翁察之久矣欲度故自往余語禪者普仁仁曰障必自去非人能去也渠如此道而不解乎世傳吕先生像張目奮鬚捉脫如市墨者乃庸人也南唐後主使工訪别本而圖之久而不得他日有人過之自言得吕翁真本約王圖其像而後授之工後以像過之客舍市邸方畫掛叩關不發問吾像如何且使張之曰是也相語而覺稍逺已而聲絶發門索之無見也意客即吕翁也乃以所畫像獻之今有傳焉深靜秀清真神人也罪說文從辛從自古罪人蹙鼻苦辛之憂秦以罪似皇字改為罪臣鉉等曰自古者以為鼻字故從自罪捕魚竹网從网非余謂使民自辛欲其不犯秦從网非不失有罪也罪古文也說文不當以寫之駕以一馬夾轅謂之兩服服供其事也左右又各駕一馬謂之兩驂驂副也總謂之乘又云駟騑亦參也說文云驂駕王馬非也乘車四馬以乘為四名乘矢乘韋是也瓠子在雷澤黃河故道今呼為沙河沙河西北其西猶在土人謂之瓠岡也吳越錢氏人成丁歲賦錢三百六十謂之身錢民有至老死而不冠者杜正獻公丁文簡公為河東宣撫河陽節度判官桂遜公惠公之子上書言事歷詆執政至公惠曰至於臣父亦出遭逢謂其非德選也進奏院報至正獻戲文簡曰賢郎亦要牢籠文簡深銜之其後二公同在政府人言蘇子美進奏院祠神事正獻避嫌不與文簡論以深文子美坐廢為民從坐者數千人皆名士大夫也正獻一罷去一言之謔貽禍一時故不可不慎也元祐八年九月六日奉太皇太后遺詔實以三日青楊生好畫而患其不能别也釋從有畫名而從之學有以畫來必召楊而教之此其所以為能此其所以為不能也楊有得焉而謂楊曰盡子所知才得其半何則以子之不能畫也乖崖在陳一日方食進奏報至且食且讀既而抵案慟哭久之哭止復彈指罵詈久之乃丁晉公逐萊公也乖崖知禍必及已乃延三大户於便坐與之博袖間出彩骰子勝其一坐乃買田宅為歸計以自汙晉公聞之亦不害也余謂此智者為之賢者不為也賢者有義而已寧避禍哉禍豈可避耶乖崖自成都召為參知政事既至而腦疽大作不可巾幞乖崖自陳求補外真宗使軟褁赴朝乖崖曰豈可以臣一人而壞朝廷法制耶乃知杭而疾愈上聞之使中人往視之言且將召也丁晉公以白金千兩賜使者還言如故乃不召外大父莊敏公為鄜延招討使元昊效順公召李誠之問其信否誠之曰元昊數欺中國故疑之今則可信也元昊向得歲賜而不用積年而後叛今用兵數歲雖戰屢勝而所攻不克田里所掠不辦一日之費向來之積費也盡矣故罷兵耳然公毋以為功歸朝廷則兵可罷竊計諸公不以此與人也公未以為然既而果遣兩人以他事使昊過延問朝廷議罷兵云何皆曰不知及還與夏使王延夀來公召㑹兩人問延夀來意又曰不知公曰延夀黠詐與君來而君且不知耶召禆將曰問延夀何來吾為將而不與知邪亟書所奏事來不然且遣還兩人大懼乃以情告願還使者公曰軍令不可反君自止之而書其事來兩人具以事聞公自是異李焉元昊既效順而不肯臣請稱東朝帝為父國號吾祖年用私號求割三州十六縣地朝議彌年不决既而報書年用甲子國號易其一字昊使過延公坐堂上召昊使立前而謂曰爾主欲戰則戰今不戰而降則朝廷所賜藩臣詔與頒朔封國皆有常制不必諭至所求割地自古未聞割地與人而不致自蹙者也三州十六縣豈可得耶使曰清逺故屬我且墳墓所在故欲得耳公曰中國所失州縣今未十年若論墳墓所在則中國多矣使語塞公曰爾主既受封嵗祿多少此則可議餘不足論昊使畏服英廟之崩知州事龍圖閣待制韓公服金帶肩輿而出以聽遺詔既成服又欲改服以治事寮佐間之而止余為兒時聞徐父老說莊獻上仙李文定公為守兩吏持箱奉遺誥公步從以哭自便坐至門外嘉祐末先人為冀州支使知州事皇城副使王易經用乾興故事遺詔既至王召見先人便服持遺制哭以示先人遂都留守龍圖王學士益柔擇日而成服士大夫家居者皆㑹哭於府廷張文定公方平致仕於家舉哀於近寺宦者李堯輔言上散髮解帶襪而不履下髮衫帽勒帛以聽宣制是日成服元豐末余客南都聞此水浮百物而不能勝玉可以試玉也祕書監劉几好音與國工花日新遊是時監貴幸其弟衛卿諫不用乃戒門下勿通監約鳴管以自通卿又使他工橫吹於門以誤之凡數奏而不出卿又告之監曰非也語次而工至橫管一鳴監笑曰此是也乃走出世傳張長史學吳畫不成而為草顔魯公學張草不成而為正世豈知其然哉蓋英才傑氣不減其師各自成家以名于世使張為吳畫既不能越功與之齊必出其下亦爭名之弊也英宗即位韓忠獻公使諭宗室諸王曰皇帝已即位大王宜思保富貴毋行所悔諸王皇恐詣次求見公謝却之某王還次及階足廢不舉扶而後升王荆公為相喜說字始遂以成俗劉貢父戲之曰三鹿為粗粗不及牛三牛為奔奔不及鹿謂宜三牛為粗三鹿為奔茍難於遽改令各權發遣於是解縱繩墨不次用人往往自小官暴據要地以資淺皆號權發遣云故并譏之張公忠定守蜀聞萊公大拜曰冦凖真宰相也又曰蒼生無福幕下怪問之曰人千言而盡凖一言而盡然仕太早用太速不及學爾張冦布衣交也萊公兄事之忠定常面折不少恕雖貴不改也萊公在岐忠定任蜀還不留既别顧萊公曰曾讀霍光傳否曰未也更無他語蓋以不學為戒也萊公資豪侈自布衣夜常設燭厠間燭淚成堆及貴而後房無嬖幸也王某公薨祕書朝少監端彥以外姻為懴罪而戒僧和我乃大唱曰妬賢嫉能罪消滅聞者莫不笑也潘美為并帥代之北都山有天池焉歲遣通判祭之其後憚逺而罷久之契丹遣祭焉又易其屋記至熙寧中始有其地凡數歲兩使往來卒不能辨而與之故事歲賜契丹金繒服器召二府觀焉熙寧中張文定公以宣徽使與召衆謂天子修貢為辱而陛下神武可一戰勝也公獨曰陛下謂宋與契丹凡幾戰勝負幾何兩府諸公皆莫知也神宗以問公公曰宋與契丹大小八十一戰惟張齊賢太原之戰才一勝爾陛下視和與戰孰便上善之元祐初司馬溫公輔政是歲天下斷死罪凡千人其後二吕繼之歲常數倍此豈人力所能勝邪錢塘江邊土惡不能堤錢氏以薪為之水至輒潰隨補其處日取於民家出束薪民以為苦張夏為轉運使取石西山以為岸募捍江軍以供其役於是州無水患而民無橫賦范文正公帥鄜延答元昊書不請宋元憲請云度必擅以土地金帛許之晏元憲鄭文肅請驗其書仲淹素直必不𨼆書既上乃免太祖既受位使告諸道東諸侯坐使者而問故宰相其誰乎樞密使副其誰乎軍職其誰乎從官其誰乎皆不改舊乃下拜真宗至陳橋駐驛不前行遣知院陳堯叟先至澶問知州何承矩當住江陵當住澶淵耶堯叟夜至城下不得入既明承矩遣通判率郡官迎駕久之承矩亦出見堯叟堯叟傳宣承矩曰某守藩將爾安知可否此宗工大儒素所留心者顧吏取自書劄子曰臣帶郡符率屬吏躬詣界首奉迎聖駕將面天顔不任踴躍歡呼之至實封以付堯叟堯叟復問對如前堯叟既至真宗遣中使問堯叟承矩云何道路相踵既至發封乃知當去而堯叟兄弟皆大怒承矩卒諸子不敢仕承矩於雄州北築愛景臺植蓼花日至其處吟詩數十首刻石人以謂何六宅愛蓼花不知經始塘泊也自五代來契丹歲壓境及中國徴發即引去遣問之曰校獵爾以是困中國豫為汝隂學官學者多言萬夀之西潁水之上有林號稅子步步之西有異木人莫能名相傳數百歲榮落不時舊有碑云粉黛塗容金剎之樹余過之往觀焉木身才十數年爾是時歲暮羣木皆落從者以為枯也木下有剎石石有象文有銘云曹公有悟怖心未已敬造浮圖式崇妙理文詞闡相粉黛塗容金剎一樹永出煩籠開元十六年歲在執徐首旬五日建地故佛氏道場石乃剎下銘也粉黛塗容謂建像也金剎一樹謂建剎也讀者寡陋傳者喜為緣飾茍無此石亦足惑世也蔡州壺公觀有大木世亦莫能名也髙數十尺其枝垂入地有根復出為木枝復下垂如是三四重圍環列如子孫然世傳漢費長房遇仙者處木即縣壺者沈丘令張戣閩人嘗至蔡為余言乃榕木也嶺外多有之其四垂旁出無足怪者柳子厚柳州詩云榕葉滿庭鶯亂飛者是也余讀魏氏雜編見真宗時公卿大夫慰國哀登極往還書蓋大臣同憂戚宜有慶弔往在南都奉神宗諱見蘇尚書作路發運帖莫知當慰與否也相與商論竟復中輟乃知前輩禮法猶在而近世士大夫之寡聞也因録之冦侍郎慰書曰伏以大行皇帝奄棄萬邦天下臣子畢同號慕昔同華綴俱受異恩攀靈馭以無由望天顔而永訣方纏悲緒遽捧台函摧咽之誠倍萬常品賀書曰伏以聖人出震大明初耀於四方王澤如春普慶俄頒於九有凡在照臨之下畢同歡忭之心侍郎久滯外藩已成美政廊廟佇徴於舊德雲雷始洽於新恩未果馳誠先蒙飛翰感銘欣慰無以喻名夏英公家中風方父子屢中輒愈鱁魚大魚白也今謂之魶子王學士逵妻某氏妾常辱之訴于逵不受亦不較也或問之曰彼將去矣不必校也已而逵怒逐之某盡歸其裝一家皆諫止之曰此自彼有我何與焉然亦非彼所有也妾遇盜盡亡其資常語家人今夕甘露下使以器取之又謂逵曰新婦妾某日當死以後事纍驗皆然仁宗四時衣夾冬不御爐夏不御扇太祖為太原鎮將舍縣人李媪家媪事之謹他日訪其家媪則死矣得其子以為御厨使久之不遷求去太祖曰以而才地御厨使其可得也爵祿以待賢能而私故人使我愧見士大夫而爾意猶不滿耶太祖閲蜀宫畫圖問其所用曰以奉人主爾太祖曰獨覽孰若使衆觀邪於是以賜東華門外茶肆太祖不以法吏為微官畏其迂情而就法也王荆公嫁女蔡氏慈夀宫賜珠褥直數十萬前世陋儒謂秦璽所在為正統故契丹自謂得傳國璽欲以歸太祖太祖不受曰吾無秦璽不害為國且亡國之餘又何足貴乎契丹畏服嘉祐之末宴二府兩制三館於羣玉殿御書飛白以遍賜之蔡襄王圭同為學士襄有書名而仁宗使圭題所賜兩人各自得也太宗不豫吕正惠公宿西省內侍都知王某夜叩省門以喪訃告且問所立於是長子楚王以疾廢宗次為太子諸子王者五人公曰此何語內侍欲斬邪豫立太子正為此耳且吾奉手詔可取視也王既入公遽合户鎖之而去真宗既立還而出之太宗數私謂正惠公曰與太子問起居既崩奉太子至福寧庭中而先登御榻解衣視之而降揖太子以登遂即位張忠定公令崇陽民以茶為業公曰茶利厚官將取之不若早自異也命拔茶而植桑民以為苦其後𣙜茶他縣皆失業而崇陽之桑皆已成其為絹而北者歲百萬匹其富至今始令下惟通樂一鄉不變其後别自為縣民亦貧至今也韓魏公屢薦歐陽公而仁宗不用他日復薦之曰韓愈唐之名士天下望以為相而竟不用使愈為之未必有補於唐而談者至今以為謗歐陽修今之韓愈也而陛下不用臣恐後人如唐謗必及國不特臣輩而已陛下何惜不一試之以曉天下後世也上從之葉表為句容令縣有盜改置社稷而盜止下邳故多盜近歲遷社稷於南山之上盜亦衰息司馬溫公云仁宗崩有司用乾興故事羣臣布四腳加冠於是時莫識其制以幅巾幕首破其後為四腳其後鄭毅夫讀續事始云三代黔首以皂絹裹髮周武帝裁為四腳名以幞頭馬周請重繫前腳蓋布四腳腳皆後垂如周制遇暑則繫其前腳如唐制英宗崩宋次道誤為布幞頭有司遂用民間布喪之服以金漆紗幞頭去其鐵腳而布裹之前繫後垂而不可加冠壞之而冠幞頭之失自次道始也余謂四腳加冠今士大夫喪冠是也夫布之冠古也四腳今也於禮為繁矣蕭賈竇氏兄弟同利伯治要仲治繁季為士逸飲無度伯薄之給與有限仲數私為償其費季德之祖親膉伯疏卒仲之子復為士游學京師季始疑之彼能欺其兄而私我也惡知其不欺我而私其子數以詆仲仲實不私也而無以自明季終疑之相與如仇嗟乎不慎其始卒以相詆爾雅哉始也注云尚書四月哉生魄釋文云亦作裁疏云古文作才以聲近借為哉始之哉也余繁說文才草木之初生也才言之間也當作才非借也又按集韻繒一入色曰才借作才非是無為軍巢縣柘臯鎮永寧院有雀棲於庭松纍日不去遣取視之已立化矣盛夏極暑經涉月餘形質不壞軒喙鼓翼有騰翥之狀阿井在陽榖縣故東阿城中惟二井耳水也相傳稱之比他水重爾廣濟衙門之上有石榴木相傳久矣元豐末枯死既而軍廢為縣元祐初復生而軍復後山談叢卷三
